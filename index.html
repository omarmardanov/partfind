  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:#0d0d0b;--g700:#4a4a46;--g500:#888880;--g400:#aaaaaa;
      --g300:#ccccc4;--g200:#e0e0d8;--g100:#f2f2ee;--g50:#f9f9f6;--white:#ffffff;
      --green:#2e7d55;--green-bg:#eaf4ef;--amber:#a05c00;--amber-bg:#fff4e5;
      --red:#b83232;--red-bg:#fdf0f0;
      --font-d:'Playfair Display',Georgia,serif;
      --font-b:'Plus Jakarta Sans',system-ui,sans-serif;
      --r:12px;--r-sm:8px;
    }
    html { height: 100%; }
    body { min-height:100%; font-family:var(--font-b); color:var(--black); background:var(--g100); -webkit-font-smoothing:antialiased; overflow-x:hidden; }
    #root { min-height:100dvh; display:flex; flex-direction:column; align-items:center; }
    .app { width:100%; max-width:480px; background:var(--white); display:flex; flex-direction:column; min-height:100dvh; }

    /* TOPNAV */
    .topnav { display:flex; align-items:center; justify-content:space-between; padding:13px 20px; border-bottom:1px solid var(--g100); background:var(--white); position:sticky; top:0; z-index:100; gap:16px; width:100%; max-width:480px; }
    .topnav-logo { font-family:var(--font-d); font-size:20px; font-weight:700; color:#0D0D0B; cursor:pointer; flex-shrink:0; display:flex; align-items:center; gap:8px; }
    .topnav-stats { font-size:12px; color:var(--g500); text-align:right; white-space:nowrap; line-height:1.6; }
    .topnav-stats-label { font-size:10px; color:var(--g400); text-transform:uppercase; letter-spacing:.06em; }

    /* REGION */
    .region-wrap { position:relative; flex-shrink:0; display:inline-flex; align-items:center; }
    .region-sizer { position:absolute; visibility:hidden; pointer-events:none; white-space:nowrap; font-family:var(--font-b); font-size:13px; font-weight:500; padding:7px 30px 7px 14px; }
    .region-select { font-family:var(--font-b); font-size:13px; font-weight:500; color:var(--g700); background:var(--g100); border:none; border-radius:20px; padding:7px 30px 7px 14px; cursor:pointer; outline:none; -webkit-appearance:none; -moz-appearance:none; appearance:none; width:100%; }
    .region-select:focus { background:var(--g200); }
    .region-caret { position:absolute; right:11px; top:50%; transform:translateY(-50%); font-size:10px; color:var(--g500); pointer-events:none; }

    .main { flex:1; }

    /* HOME */
    .home-wrap { padding:40px 24px 0; display:flex; flex-direction:column; min-height:calc(100dvh - 57px); }
    .home-headline { font-family:var(--font-d); font-weight:700; font-size:40px; line-height:1.1; margin-bottom:32px; letter-spacing:-0.2px; animation:fadeUp .45s ease both; max-width:300px; }
    .home-headline em { font-style:italic; color:#aaaaaa; font-weight:600; }
    .search-box { position:relative; margin-bottom:6px; animation:fadeUp .45s .07s ease both; }
    .search-input { width:100%; font-family:var(--font-b); font-size:16px; font-weight:400; color:var(--black); background:var(--g100); border:2px solid transparent; border-radius:var(--r); padding:14px 52px 44px 18px; outline:none; transition:border-color .2s,background .2s; line-height:1.5; resize:none; overflow:hidden; min-height:90px; display:block; }
    .search-input:focus { border-color:var(--g300); background:var(--white); }
    .search-input::placeholder { color:var(--g500); }
    .search-go { position:absolute; right:12px; bottom:12px; width:34px; height:34px; background:var(--black); border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s,transform .15s; }
    .search-go:hover { background:var(--g700); transform:scale(1.06); }
    .search-hint { font-size:12px; color:var(--g500); line-height:1.5; padding:0 2px; margin-bottom:28px; animation:fadeUp .45s .1s ease both; }
    .section-label { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--g500); margin-bottom:12px; }
    .chip-row { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { font-family:var(--font-b); font-size:13px; color:var(--g700); background:var(--g100); border:none; border-radius:20px; padding:7px 14px; cursor:pointer; transition:background .15s; }
    .chip:hover { background:var(--g200); }
    .home-footer { margin-top:auto; padding:24px 0 28px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--g100); }
    .text-link { font-size:13px; color:var(--g500); background:none; border:none; border-bottom:1px solid var(--g300); cursor:pointer; font-family:var(--font-b); padding-bottom:1px; transition:color .15s; }
    .text-link:hover { color:var(--black); }
    .online-badge { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--g500); }
    .dot-live { width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0; }

    /* RESULTS */
    .results-header { padding:14px 20px 12px; border-bottom:1px solid var(--g100); position:sticky; top:57px; background:var(--white); z-index:50; }
    .back-btn { display:flex; align-items:center; gap:5px; font-size:13px; color:var(--g500); background:none; border:none; cursor:pointer; font-family:var(--font-b); padding:0; margin-bottom:10px; transition:color .15s; }
    .back-btn:hover { color:var(--black); }
    .results-title { font-family:var(--font-d); font-weight:600; font-size:22px; line-height:1.2; margin-bottom:10px; }
    .param-chips { display:flex; flex-wrap:wrap; gap:6px; }
    .param-chip { font-size:12px; color:var(--g700); background:var(--g100); border:none; border-radius:20px; padding:5px 10px 5px 12px; display:flex; align-items:center; gap:4px; cursor:pointer; font-family:var(--font-b); transition:background .15s; }
    .param-chip:hover { background:var(--g200); }
    .chip-x { color:var(--g400); font-size:15px; line-height:1; }
    .results-meta { padding:9px 20px; font-size:12px; color:var(--g500); border-bottom:1px solid var(--g100); }
    .no-results { padding:48px 24px; text-align:center; }
    .no-results-icon { font-size:36px; margin-bottom:14px; }
    .no-results h3 { font-family:var(--font-d); font-weight:600; font-size:20px; margin-bottom:8px; }
    .no-results p { font-size:14px; color:var(--g500); line-height:1.6; }
    .result-item { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:14px 20px; border-bottom:1px solid var(--g100); cursor:pointer; transition:background .12s; }
    .result-item:hover { background:var(--g50); }
    .result-left { flex:1; min-width:0; }
    .result-name { font-size:15px; font-weight:500; line-height:1.3; margin-bottom:3px; }
    .result-sub { font-size:13px; color:var(--g500); }
    .result-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
    .result-price { font-size:16px; font-weight:700; font-family:var(--font-b); }
    .result-price.no-price { font-size:13px; color:var(--g400); font-style:italic; font-weight:400; }
    .avail { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--g500); }
    .avail-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .avail-dot.green { background:var(--green); }
    .avail-dot.grey { background:var(--g300); }

    /* SHEET */
    body.sheet-open { overflow:hidden; }
    .sheet-overlay { position:fixed; inset:0; background:rgba(13,13,11,.3); z-index:200; opacity:0; pointer-events:none; transition:opacity .3s; }
    .sheet-overlay.open { opacity:1; pointer-events:all; }
    .sheet { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; max-height:88dvh; background:var(--white); border-radius:20px 20px 0 0; z-index:201; transition:transform .36s cubic-bezier(.32,.72,0,1); display:flex; flex-direction:column; overflow:hidden; }
    .sheet.open { transform:translateX(-50%) translateY(0); }
    .sheet-toprow { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 6px; flex-shrink:0; }
    .sheet-cat { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--g500); }
    .sheet-close { width:28px; height:28px; background:rgba(0,0,0,0.06); border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; flex-shrink:0; }
    .sheet-close:hover { background:rgba(0,0,0,0.11); }
    .sheet-body { flex:1; overflow-y:auto; padding:4px 20px 24px; scrollbar-width:none; }
    .sheet-body::-webkit-scrollbar { display:none; }
    .sheet-title { font-family:var(--font-d); font-weight:600; font-size:24px; line-height:1.2; margin-bottom:14px; }
    .field-table { margin-bottom:18px; }
    .field-row { display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-bottom:1px solid var(--g100); }
    .field-row:first-child { border-top:1px solid var(--g100); }
    .field-lbl { font-size:12px; color:var(--g500); text-transform:uppercase; letter-spacing:.06em; }
    .field-val { font-size:14px; text-align:right; font-family:var(--font-b); }
    .field-val.big { font-family:var(--font-b); font-weight:700; font-size:14px; }
    .field-val.green { color:var(--green); }
    .field-val.muted { color:var(--g400); font-style:italic; font-weight:400; }
    .seller-box { background:var(--g50); border-radius:var(--r); padding:14px 16px; margin-bottom:14px; }
    .seller-box-name { font-size:15px; font-weight:600; margin-bottom:3px; display:flex; align-items:center; gap:7px; }
    .seller-box-meta { font-size:12px; color:var(--g500); }
    .cta-wrap { display:flex; flex-direction:column; gap:10px; }
    .cta-btn { width:100%; padding:15px; background:var(--black); color:var(--white); border:none; border-radius:var(--r); font-family:var(--font-b); font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:background .15s; text-decoration:none; }
    .cta-btn:hover { background:var(--g700); }
    .cta-btn.secondary { background:var(--g100); color:var(--black); font-size:14px; padding:13px; font-weight:500; }
    .cta-btn.secondary:hover { background:var(--g200); }

    /* LOGIN */
    .login-page { display:flex; flex-direction:column; min-height:calc(100dvh - 57px); padding:40px 24px 40px; }
    .login-headline { font-family:var(--font-d); font-weight:700; font-size:34px; line-height:1.1; margin-bottom:8px; }
    .login-sub { font-size:14px; color:var(--g500); line-height:1.5; margin-bottom:36px; }
    .login-step { animation:fadeUp .3s ease both; }
    .login-field-label { font-size:12px; font-weight:600; color:var(--g700); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
    .phone-wrap { display:flex; background:var(--g100); border:2px solid transparent; border-radius:var(--r); transition:border-color .2s,background .2s; overflow:hidden; }
    .phone-wrap:focus-within { border-color:var(--g300); background:var(--white); }
    .phone-prefix { font-family:var(--font-b); font-size:16px; font-weight:500; color:var(--g700); padding:15px 0 15px 16px; background:transparent; border:none; outline:none; white-space:nowrap; flex-shrink:0; }
    .phone-input { font-family:var(--font-b); font-size:16px; font-weight:400; color:var(--black); background:transparent; border:none; outline:none; padding:15px 16px 15px 6px; width:100%; letter-spacing:.03em; }
    .phone-input::placeholder { color:var(--g400); }
    .login-hint { font-size:12px; color:var(--g500); margin-top:8px; line-height:1.5; }
    .login-btn { width:100%; margin-top:20px; padding:17px; background:var(--black); color:var(--white); border:none; border-radius:var(--r); font-family:var(--font-b); font-size:15px; font-weight:600; cursor:pointer; transition:background .15s; }
    .login-btn:hover { background:var(--g700); }
    .login-btn:disabled { background:var(--g300); cursor:not-allowed; }
    .otp-boxes { display:flex; gap:10px; margin-bottom:8px; width:100%; }
    .otp-box { flex:1; min-width:0; height:56px; font-family:var(--font-b); font-weight:600; font-size:22px; text-align:center; background:var(--g100); border:2px solid transparent; border-radius:var(--r); outline:none; color:var(--black); transition:border-color .2s,background .2s; -webkit-text-fill-color:var(--black); caret-color:var(--black); }
    .otp-box:focus { border-color:var(--g300); background:var(--white); }

function formatDateAZ(date) {
  if (!date) return null;
  const d = new Date(date), diffDays = Math.floor((new Date()-d)/86400000);
  if (diffDays===0) return "Bu gün";
  if (diffDays===1) return "Dünən";

// Known region id → city name
const KNOWN_REGIONS = {baku:"Bakı", ganja:"Gəncə", nakh:"Naxçıvan"};

// Build region list from live seller cities
// Cities with sellers shown normally; known cities without sellers shown as "tezliklə"; unknown cities added dynamically
function buildRegions(sellerCities){
  const citySet = new Set(sellerCities);
  const hasCity = city => citySet.has(city);

  const list = [
    {id:"all", label:"Bütün Azərbaycan"},
    {id:"baku", label:"Bakı", soon:!hasCity("Bakı")},
    {id:"ganja", label:"Gəncə", soon:!hasCity("Gəncə")},
    {id:"nakh", label:"Naxçıvan", soon:!hasCity("Naxçıvan")},
  ];

  // Add any city not covered by known regions
  sellerCities.forEach(city=>{
    if(!["Bakı","Gəncə","Naxçıvan"].includes(city)){
      const id="city_"+city.toLowerCase().replace(/[\s-]/g,"_");
      if(!list.find(r=>r.id===id)) list.push({id, label:city, soon:false});
    }
  });
  return list;
}

// Derive Firestore region key from city name
function cityToRegion(city) {
  if (!city) return "other";
  const c = city.trim();
  if (c === "Bakı") return "baku";
  if (c === "Naxçıvan") return "nakh";
  if (c === "Gəncə") return "ganja";
  return "other";
}

const BRAND_MAP={"peugeot":"Peugeot","pejo":"Peugeot","lada":"Lada","vaz":"VAZ","toyota":"Toyota","hyundai":"Hyundai","bmw":"BMW","mercedes":"Mercedes","ford":"Ford","opel":"Opel","volkswagen":"Volkswagen","vw":"Volkswagen","kia":"KIA","honda":"Honda","nissan":"Nissan","chevrolet":"Chevrolet"};
const MODEL_MAP={"308":"308","207":"207","206":"206","2008":"2008","granta":"Granta","priora":"Priora","camry":"Camry","corolla":"Corolla","yaris":"Yaris","accent":"Accent","tucson":"Tucson","elantra":"Elantra","golf":"Golf","passat":"Passat","polo":"Polo","focus":"Focus","2107":"2107","2106":"2106"};
const PART_MAP={"radiator":"Radiator","radyator":"Radiator","alternator":"Alternator","generator":"Alternator","генератор":"Alternator","tormoz":"Tormoz bəndi","brake":"Tormoz bəndi","колодки":"Tormoz bəndi","yağ filteri":"Yağ filteri","oil filter":"Yağ filteri","amortizator":"Amortizator","shock":"Amortizator","амортизатор":"Amortizator","vaxt kəməri":"Vaxt kəməri","timing":"Vaxt kəməri","su pompası":"Su pompası","pompa":"Su pompası","starter":"Starter motor","mühərrik":"Digər","motor":"Digər","двигатель":"Digər","mator":"Digər","sükan":"Digər","transmissiya":"Digər","КПП":"Digər","şüşə":"Digər","bamper":"Digər","фара":"Digər","stoplar":"Digər"};

function parseQuery(raw){
  const q=raw.toLowerCase().trim(),tokens=q.split(/[\s,\-\/]+/);
  const p={brand:null,model:null,year:null,engine:null,partType:null};
  for(const a of Object.keys(PART_MAP).sort((a,b)=>b.length-a.length)){if(q.includes(a)){p.partType=PART_MAP[a];break;}}
  // Match brand from CAR_DB keys
  for(const make of CAR_MAKES){
    if(q.includes(make.toLowerCase())){p.brand=make;break;}
  }
  // Fallback to legacy BRAND_MAP
  if(!p.brand){for(const t of tokens){if(BRAND_MAP[t]){p.brand=BRAND_MAP[t];break;}}}
  // Match model from CAR_DB
  if(p.brand && CAR_DB[p.brand]){
    for(const model of CAR_DB[p.brand]){
      if(q.includes(model.toLowerCase())){p.model=model;break;}
    }
  }
  if(!p.model){for(const t of tokens){if(MODEL_MAP[t]){p.model=MODEL_MAP[t];break;}}}
  const yr=q.match(/\b(19[5-9]\d|20[0-2]\d)\b/);if(yr)p.year=parseInt(yr[1]);
  const eng=q.match(/\b(\d+\.\d+)\b/);if(eng)p.engine=eng[1];
  return p;
}

// Score a product against parsed query params
function scoreProduct(p, params, rawQuery) {
  const compat = p.compatibility && p.compatibility.length > 0 ? p.compatibility : null;

  // ── Compatibility score: best matching entry wins ──
  let compatScore = 0;
  let brandMatched = false;
  let modelMatched = false;

  if(compat){
    for(const entry of compat){
      let es = 0;
      const bm = params.brand && entry.make === params.brand;
      const mm = params.model && entry.model === params.model;
      const ym = params.year && entry.yearFrom && entry.yearTo && params.year >= entry.yearFrom && params.year <= entry.yearTo;
      if(bm) es += 2;
      if(mm) es += 2;
      if(ym) es += 1;
      if(es > compatScore){
        compatScore = es;
        if(bm) brandMatched = true;
        if(mm) modelMatched = true;
      }
    }
  } else {
    // Legacy flat fields
    const bm = params.brand && p.brand === params.brand;
    const mm = params.model && p.model === params.model;
    const ym = params.year && p.yearFrom && p.yearTo && params.year >= p.yearFrom && params.year <= p.yearTo;
    if(bm){ compatScore += 2; brandMatched = true; }
    if(mm){ compatScore += 2; modelMatched = true; }
    if(ym) compatScore += 1;
  }

  // ── Hard filters: if query specifies brand/model, product MUST match them ──
  // This prevents "Peugeot 308 Radiator" from returning Hyundai radiators
  if(params.brand && !brandMatched) return 0;
  if(params.model && !modelMatched) return 0;

  // ── Part type score — hard filter if partType specified ──
  let score = compatScore;
  if(params.partType){
    if(p.partType !== params.partType) return 0; // must match exactly
    score += 3;
  }
  if(params.engine && p.engine && p.engine.includes(params.engine)) score += 1;

  // ── Minimum: need at least one signal to show ──
  // If query has no brand/model/partType parsed, fall back to name search
  const hasStructuredParams = params.brand || params.model || params.partType;
  if(!hasStructuredParams && rawQuery){
    const tokens = rawQuery.toLowerCase().split(/[\s,\-\/]+/).filter(t => t.length > 2);
    const compatText = compat
      ? compat.map(e => [e.make, e.model].filter(Boolean).join(" ")).join(" ")
      : [p.brand, p.model].filter(Boolean).join(" ");
    const haystack = [p.name, p.partType, compatText].filter(Boolean).join(" ").toLowerCase();
    // Require at least 2 tokens to match, or 1 token that matches the product name directly
    const matchCount = tokens.filter(t => haystack.includes(t)).length;
    if(matchCount === 0) return 0;
    if(tokens.length === 1) return matchCount > 0 ? 1 : 0;
    return matchCount >= Math.min(2, tokens.length) ? 1 : 0;
  }

  // Name-based boost: if product name contains a query token, add 1
  if(rawQuery && score > 0){
    const tokens = rawQuery.toLowerCase().split(/[\s,\-\/]+/).filter(t => t.length > 2);
    const haystack = [p.name, p.partType].filter(Boolean).join(" ").toLowerCase();
    if(tokens.some(t => haystack.includes(t))) score += 1;
  }

  return score;
}

function normalizeHeader(h){
  // Azerbaijani İ lowercases to i + combining dot (U+0307), not plain i
  // Replace all variants of dotted-I with plain i for COL_MAP lookup
  return h.toLowerCase().replace(/i\u0307/g,"i").replace(/\u0130/g,"i").trim();
}
function inferCols(headers){return headers.map(h=>{const low=normalizeHeader(h),inf=COL_MAP[low];return{original:h,inferred:inf!==undefined?(inf===null?"ignore":inf):"ignore",confidence:inf===null?"warn":inf!==undefined?"ok":"warn"};});}
function normalizeRows(rows,mappings){
  // Step 1: parse each raw row
  const parsed=rows.slice(0,200).map((row,i)=>{
    const obj={};
    mappings.forEach(m=>{if(m.inferred&&m.inferred!=="ignore")obj[m.inferred]=row[m.original]||null;});
    // Parse price — strip currency symbols and text
    if(obj.price) obj.price=String(obj.price).replace(/[^\d.]/g,"").trim()||null;
    // Normalise availability
    if(obj.availability){
      const av=String(obj.availability).toLowerCase().trim();
      obj.availability=["var","есть","in_stock","1","bəli","yes"].includes(av)?"in_stock":"on_order";
    }
    // Single compat entry from this row
    const make=(obj.compatMakes||obj.brand||"").trim();
    const model=(obj.compatModels||obj.model||"").trim();
    const yearFrom=obj.yearFrom?Number(String(obj.yearFrom).replace(/\D/g,""))||null:null;
    const yearTo=obj.yearTo?Number(String(obj.yearTo).replace(/\D/g,""))||null:null;
    obj._compatEntry=(make||model)?{make,model,yearFrom,yearTo}:null;
    return{...obj,_rawIdx:i};
  }).filter(row=>Object.values(row).some(v=>v&&v!==""&&v!==null));

  // Step 2: group rows with same name+price into one product (multi-compat)
  const grouped=[];
  const seen={};
  for(const row of parsed){
    const key=(row.partName||"")+"||"+(row.price||"");
    const cleanName=(row.partName||"").trim();
    if(!cleanName||cleanName.length<2){continue;}
    row.partName=cleanName;
    if(seen[key]!==undefined){
      // Append compat entry to existing product
      if(row._compatEntry) grouped[seen[key]].compatibility.push(row._compatEntry);
    } else {
      seen[key]=grouped.length;
      const compat=row._compatEntry?[row._compatEntry]:[];
      let status="ok",issue="Bütün sahələr xəritələndi";
      if(!row.price){status="warn";issue="Qiymət tapılmadı";}
      else if(compat.length===0){status="warn";issue="Avtomobil uyğunluğu qeyri-müəyyəndir";}
      grouped.push({...row,compatibility:compat,_id:grouped.length,_status:status,_issue:issue});
    }
  }
  return grouped.slice(0,100);
}

function ResultsPage({query,region,onBack,onProduct,onContact}){
  const [params,setParams]=useState(()=>parseQuery(query));
  const [allProducts,setAllProducts]=useState([]);
  const [sellers,setSellers]=useState({});
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    // Load active products from Firestore
    // Query all live products, filter by region client-side
    // (avoids Firestore composite index requirement and fixes legacy docs without region field)
    let q2=db.collection("products").where("status","==","live");
    return q2.onSnapshot(snap=>{
      const prods=snap.docs.map(d=>({id:d.id,...d.data()}));
      setAllProducts(prods);
      // Load seller info for these products
      const sellerIds=[...new Set(prods.map(p=>p.sellerId).filter(Boolean))];
      sellerIds.forEach(sid=>{
        db.collection("sellers").doc(sid).get().then(d=>{
          if(d.exists) setSellers(s=>({...s,[sid]:{id:sid,...d.data()}}));
        });
      });
      setLoading(false);
    },()=>setLoading(false));
  },[region]);

  const results = allProducts
    .map(p=>({...p,_score:scoreProduct(p,params,query)}))
    .filter(p=>{
      if(p._score<2) return false;
      if(region==="all") return true;
      // For dynamic city keys, match against seller's city
      if(region.startsWith("city_")){
        const cityLabel=region.replace("city_","").replace(/_/g," ");
        const sellerCity=(sellers[p.sellerId]||{}).city||"";
        return sellerCity.toLowerCase()===cityLabel.toLowerCase();
      }
      // For known region keys (baku/ganja/nakh), match p.region
      // Products with region="other" do NOT match known regions — only show under "all" or their city
      return (p.region||"other")===region;
    })
    .sort((a,b)=>{
      if(a.availability!==b.availability) return a.availability==="in_stock"?-1:1;
      return (a.price||9999)-(b.price||9999);
    });

  const removeParam=k=>setParams(p=>({...p,[k]:null}));
  const pLabels={brand:AZ.paramBrand,model:AZ.paramModel,year:AZ.paramYear,engine:AZ.paramEngine,partType:AZ.paramPart};

            </button>
          ))}
        </div>
      </div>
      {loading?<Spinner/>:<>
        <div className="results-meta">{results.length===0?"Nəticə tapılmadı":`${results.length} ${AZ.listingsFound}`}</div>
        {results.length===0?(
          <div className="no-results"><div className="no-results-icon">🔍</div><h3>{AZ.noResults}</h3><p>{AZ.noResultsSub}</p></div>
        ):results.map(p=>{
          const s=sellers[p.sellerId]||{};
          return(
            <div key={p.id} className="result-item" onClick={()=>onProduct(p,s)}>
              <div className="result-left">
                <div className="result-name">{p.name}</div>

    const today=new Date().toISOString().slice(0,10);
    const ref=db.collection("sellers").doc(product.sellerId).collection("events").doc(today);

// ── LOGIN — real Firebase Phone Auth ──
function LoginPage({onLogin,onBack}){
  const [step,setStep]=useState("phone");
  const [phone,setPhone]=useState("");
  const [otp,setOtp]=useState(["","","","","",""]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [confirmResult,setConfirmResult]=useState(null);
  const refs=[useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  // Set up invisible reCAPTCHA once
  const recaptchaRef=useRef(null);
  useEffect(()=>{
    if(!recaptchaRef.current){
      recaptchaRef.current=new firebase.auth.RecaptchaVerifier("recaptcha-container",{size:"invisible"});
    }
    return()=>{
      try{recaptchaRef.current?.clear();}catch(e){}
      recaptchaRef.current=null;
    };
  },[]);

  const sendCode=async()=>{
    if(phone.length<9){setError(AZ.errPhone);return;}
    setError("");setLoading(true);
    try{
      const fullPhone="+994"+phone;
      const result=await auth.signInWithPhoneNumber(fullPhone,recaptchaRef.current);
      setConfirmResult(result);
      setStep("otp");
      setTimeout(()=>refs[0].current?.focus(),120);
    }catch(e){
      console.error(e);
      setError(AZ.errGeneral);
      // Reset recaptcha on error
      try{recaptchaRef.current?.clear();}catch(e2){}
      recaptchaRef.current=new firebase.auth.RecaptchaVerifier("recaptcha-container",{size:"invisible"});
    }finally{setLoading(false);}
  };

  const handleOtp=(i,val)=>{
    if(!/^\d?$/.test(val))return;
    const n=[...otp];n[i]=val;setOtp(n);
    if(val&&i<5)refs[i+1].current?.focus();
    if(n.every(d=>d)&&val) verifyCode(n.join(""));
  };
  const handleKey=(i,e)=>{if(e.key==="Backspace"&&!otp[i]&&i>0)refs[i-1].current?.focus();};

  const verifyCode=async(code)=>{
    if(!confirmResult)return;
    setError("");setLoading(true);
    try{
      const result=await confirmResult.confirm(code);
      const uid=result.user.uid;
      const phone_num=result.user.phoneNumber;
      // Check if seller profile exists
      const sellerDoc=await db.collection("sellers").doc(uid).get();
      if(sellerDoc.exists){
        onLogin({uid,phone:phone_num,...sellerDoc.data()},false);
      }else{
        // New seller — create minimal profile, go to settings
        await db.collection("sellers").doc(uid).set({
          phone:phone_num,shopName:"",city:"Bakı",region:"baku",whatsapp:"",email:"",
          createdAt:firebase.firestore.FieldValue.serverTimestamp(),
          lastUpload:null,
        });
        onLogin({uid,phone:phone_num,shopName:"",city:"Bakı",whatsapp:"",email:"",lastUpload:null},true);
      }
    }catch(e){
      console.error(e);
      setError(AZ.errCode);
      setOtp(["","","","","",""]);
      setTimeout(()=>refs[0].current?.focus(),100);
    }finally{setLoading(false);}
  };

  return(
    <div className="login-page">
      <div style={{marginBottom:32}}><button className="back-btn" onClick={onBack}><Icon name="arrowLeft" size={14} strokeWidth={2}/> {AZ.back}</button></div>
      <div className="login-headline">{AZ.loginTitle}</div>
      <div className="login-sub">{AZ.loginSub}</div>
      {step==="phone"&&(
        <div className="login-step">
          <div className="login-field-label">{AZ.phoneLabel}</div>
          <PhoneInput value={phone} onChange={setPhone} autoFocus/>
          {error&&<div className="error-msg">{error}</div>}
          <button className="login-btn" onClick={sendCode} disabled={phone.length<9||loading}>
            {loading?<span className="loading-dots">Göndərilir</span>:AZ.sendCode}
          </button>
        </div>
      )}
      {step==="otp"&&(
        <div className="login-step">
          <div className="login-field-label">{AZ.codeLabel}</div>
          <div className="otp-boxes">
            {otp.map((d,i)=>(
              <input key={i} ref={refs[i]} className="otp-box" type="tel" inputMode="numeric"
                maxLength={1} value={d} onChange={e=>handleOtp(i,e.target.value)} onKeyDown={e=>handleKey(i,e)}/>
            ))}
          </div>
          <div className="login-hint">{AZ.codeSub}</div>
          {error&&<div className="error-msg">{error}</div>}
          {loading&&<div style={{textAlign:"center",marginTop:12,fontSize:13,color:"var(--g500)"}}>Yoxlanılır...</div>}
          <div style={{textAlign:"center",marginTop:16}}>
            <button className="text-link" onClick={()=>{setStep("phone");setOtp(["","","","","",""]);setError("");}}>{AZ.resend}</button>
          </div>
        </div>
      )}
    </div>
  );
}

// Format +994 XX XXX XX XX — stores raw digits after +994
function formatAzPhone(raw){
  const d=raw.replace(/\D/g,"").slice(0,9);
  let o="";
  if(d.length>0) o+=d.slice(0,2);
  if(d.length>2) o+=" "+d.slice(2,5);
  if(d.length>5) o+=" "+d.slice(5,7);
  if(d.length>7) o+=" "+d.slice(7,9);
  return o;
}

// Format international WhatsApp number — digits only, up to 15
function formatIntlPhone(raw){
  // Keep leading + if present, then digits only
  const hasPlus=raw.startsWith("+");
  const d=raw.replace(/\D/g,"").slice(0,15);
  return (hasPlus?"+":"")+d;
}

// Validate email loosely
function isValidEmail(v){ return !v || /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v); }

function AzPhoneInput({value, onChange, label}){
  // value stored as "+994XXXXXXXXX" or "XXXXXXXXX" (9 digits)
  const digits = value.replace(/\D/g,"").replace(/^994/,"").slice(0,9);
  return(
    <div className="field-wrap">
      <div className="field-label-form">{label}</div>
      <div className="phone-wrap">
        <span className="phone-prefix">+994</span>
        <input className="phone-input" type="tel" placeholder="50 000 00 00"
          value={formatAzPhone(digits)}
          onChange={e=>{
            const d=e.target.value.replace(/\D/g,"").slice(0,9);
            onChange(d.length>0?"+994"+d:"");
          }}/>
      </div>
    </div>
  );
}

function IntlPhoneInput({value, onChange, label, placeholder}){
  // Always show + prefix, user types digits after it
  // Store as +XXXXXXXXXXXXXXX
  const digits=(value||"").replace(/\D/g,"").slice(0,15);
  return(
    <div className="field-wrap">
      <div className="field-label-form">{label}</div>
      <div className="phone-wrap">
        <span className="phone-prefix">+</span>
        <input className="phone-input" type="tel" placeholder="994501234567"
          value={digits}
          onKeyDown={e=>{
            const allowed=["Backspace","Delete","ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Tab","Home","End"];
            if(allowed.includes(e.key)) return;
            if(!/^\d$/.test(e.key)) e.preventDefault();
          }}
          onChange={e=>{
            const d=e.target.value.replace(/\D/g,"").slice(0,15);
            onChange(d.length>0?"+"+d:"");
          }}/>
      </div>
    </div>
  );
}

function EmailInput({value, onChange, label}){
  const [touched,setTouched]=useState(false);
  const invalid=touched && !isValidEmail(value);
  return(
    <div className="field-wrap">
      <div className="field-label-form">{label}</div>
      <input className={`form-input${invalid?" error":""}`} type="email"
        placeholder="mağaza@example.az"
        value={value}
        onChange={e=>onChange(e.target.value.replace(/\s/g,""))}
        onBlur={()=>setTouched(true)}/>
      {invalid&&<div style={{fontSize:11,color:"var(--red)",marginTop:3}}>Düzgün e-poçt daxil edin</div>}
    </div>
  );
}

      yearTo:cleanCompat[0]?.yearTo||null,
      status:asDraft?"draft":"live",
      sellerId:seller.uid,
      region:cityToRegion(seller.city),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
    };
    try{
      if(isEdit){await db.collection("products").doc(product.id).update(data);}
      else{data.createdAt=firebase.firestore.FieldValue.serverTimestamp();await db.collection("products").add(data);}
      onSaved(asDraft);
    }catch(e){console.error(e);}
    finally{setSaving(false);}
  };

  const handleDelete=async()=>{
    if(!window.confirm(AZ.confirmDelete))return;
    try{await db.collection("products").doc(product.id).delete();onDeleted();}
    catch(e){console.error(e);}
  };

  const COUNTRIES=["Azərbaycan","Türkiyə","Almaniya","Çin","Yaponiya","Cənubi Koreya","ABŞ","Fransa","İtaliya","İspaniya","Rusiya","Polşa","Çexiya","Hindistan","Tailand","Digər"];

  return(
    <div>
      <div className="form-header">
        <button className="icon-btn" onClick={onBack}><Icon name="arrowLeft" size={16} strokeWidth={2}/></button>
        <div className="form-title">{isEdit?AZ.editProductTitle:AZ.addProductTitle}</div>
      </div>
      <div className="form-body">

        {/* ── Part info ── */}
        <div className="form-section-title">{AZ.productSection}</div>
        <div className="field-group-form">
          <div className="field-wrap" ref={nameRef}>
            <div className="field-label-form">{AZ.partName} <span className="req">— {AZ.required}</span></div>
            <input className={`form-input${errors.name?" error":""}`} placeholder="məs. Ön tormoz bəndləri"
              value={form.name} onChange={e=>{set("name",e.target.value);if(errors.name)setErrors({});}}/>
          </div>
          <div className="field-wrap">
            <div className="field-label-form">{AZ.partType}</div>
            <select className="form-select" value={form.partType} onChange={e=>set("partType",e.target.value)}>
              <option value="">{AZ.selectType}</option>
              {AZ.partTypes.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div className="field-wrap">
            <div className="field-label-form">{AZ.condition}</div>
            <select className="form-select" value={form.condition} onChange={e=>set("condition",e.target.value)}>
              <option value={AZ.condNew}>{AZ.condNew}</option>
              <option value={AZ.condUsed}>{AZ.condUsed}</option>
              <option value={AZ.condRefurb}>{AZ.condRefurb}</option>
            </select>
          </div>
        </div>

        {/* ── Manufacturer ── */}
        <div className="form-section-title">İstehsalçı</div>
        <div className="field-group-form">
          <div className="form-row">
            <div className="field-wrap">
              <div className="field-label-form">Marka</div>
              <input className="form-input" placeholder="Bosch, Brembo..." value={form.manufacturerBrand} onChange={e=>set("manufacturerBrand",e.target.value)}/>
            </div>
            <div className="field-wrap">
              <div className="field-label-form">Ölkə</div>
              <select className="form-select" value={form.manufacturerCountry} onChange={e=>set("manufacturerCountry",e.target.value)}>
                <option value="">— Seçin —</option>
                {COUNTRIES.map(ct=><option key={ct} value={ct}>{ct}</option>)}
              </select>
            </div>
          </div>
          <div className="field-wrap">
            <div className="field-label-form">Mühərrik</div>
            <input className="form-input" placeholder="1.6 benzin, 2.0 dizel..." value={form.engine} onChange={e=>set("engine",e.target.value)}/>
          </div>
        </div>

        {/* ── Compatibility ── */}
        <div className="form-section-title" style={{marginTop:22}}>Avtomobil uyğunluğu</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {compat.map((entry,i)=>(
            <CompatRow key={i} entry={entry} index={i} onChange={updateCompat} onRemove={removeCompat} showRemove={compat.length>1}/>
          ))}
          <button onClick={addCompat} style={{background:"none",border:"2px dashed var(--g200)",borderRadius:"var(--r-sm)",padding:"11px",fontSize:13,color:"var(--g500)",cursor:"pointer",fontFamily:"var(--font-b)",fontWeight:600,transition:"border-color .15s,color .15s"}}
            onMouseOver={e=>{e.target.style.borderColor="var(--g300)";e.target.style.color="var(--black)";}}
            onMouseOut={e=>{e.target.style.borderColor="var(--g200)";e.target.style.color="var(--g500)";}}>
            + Avtomobil əlavə et
          </button>
        </div>

        {/* ── Pricing ── */}
        <div className="form-section-title" style={{marginTop:22}}>{AZ.pricingSection}</div>
        <div className="field-group-form">
          <div className="field-wrap">
            <div className="field-label-form">{AZ.price}</div>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:15,color:"var(--g500)"}}>₼</span>
              <input className="form-input" type="number" placeholder="185" value={form.price} onChange={e=>set("price",e.target.value)} style={{paddingLeft:30}}/>
            </div>
          </div>
          <div className="field-wrap">
            <div className="field-label-form">{AZ.availability}</div>
            <select className="form-select" value={form.availability} onChange={e=>set("availability",e.target.value)}>
              <option value="in_stock">{AZ.inStockOpt}</option>
              <option value="on_order">{AZ.onOrderOpt}</option>
            </select>
          </div>
        </div>

        {/* ── Notes ── */}
        <div className="form-section-title" style={{marginTop:22}}>{AZ.notesSection}</div>
        <textarea className="form-input" rows={3} placeholder={AZ.notesPlaceholder} value={form.notes} onChange={e=>set("notes",e.target.value)} style={{resize:"vertical"}}/>

        <div className="form-footer">
          {isEdit&&<button className="btn btn-danger" onClick={handleDelete}>{AZ.delete}</button>}
          <button className="btn btn-secondary" onClick={()=>handleSave(true)} disabled={saving}>{AZ.saveDraft}</button>
          <button className="btn btn-primary" onClick={()=>handleSave(false)} disabled={saving}>{saving?AZ.saving:AZ.publish}</button>
        </div>
      </div>
    </div>
  );
}

// ── UPLOAD ──
function UploadScreen({seller,onBack,onReview}){
  const [file,setFile]=useState(null);
  const [drag,setDrag]=useState(false);
  const [parsing,setParsing]=useState(false);
  const handleFile=f=>{if(!f)return;if(!["csv","xls","xlsx"].includes(f.name.split(".").pop().toLowerCase())){alert("Zəhmət olmasa CSV, XLS və ya XLSX fayl yükləyin.");return;}setFile(f);};
  const analyze=()=>{
    setParsing(true);
    Papa.parse(file,{header:true,skipEmptyLines:true,complete:r=>{
      setTimeout(()=>{const m=inferCols(r.meta.fields||[]);const rws=normalizeRows(r.data,m);setParsing(false);onReview({mappings:m,rows:rws,fileName:file.name});},800);
    },error:()=>{setParsing(false);alert("Fayl oxunarkən xəta baş verdi.");}});
  };
  return(
    <div>
      <div className="form-header"><button className="icon-btn" onClick={onBack}><Icon name="arrowLeft" size={16} strokeWidth={2}/></button><div className="form-title">{AZ.uploadTitle}</div></div>
      <div className="upload-body">
        <div className={`upload-zone ${drag?"drag":""}`} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);}}>
          <input type="file" accept=".csv,.xls,.xlsx" className="upload-input" onChange={e=>handleFile(e.target.files[0])}/>
          <div className="upload-icon">📁</div>
          <div className="upload-main">{AZ.dropFile}</div>
          <div className="upload-sub">CSV, XLS və ya XLSX · İstənilən sütun adları</div>
        </div>
        {file&&(<div className="file-info"><div style={{fontSize:22}}>📄</div><div><div style={{fontSize:14,fontWeight:500}}>{file.name}</div><div style={{fontSize:12,color:"var(--g500)"}}>{(file.size/1024).toFixed(1)} KB</div></div></div>)}
        <button className="analyze-btn" disabled={!file||parsing} onClick={analyze}>{parsing?<span className="loading-dots">{AZ.analyzing}</span>:AZ.analyzeBtn}</button>
        <div style={{textAlign:"center"}}><button className="text-link" onClick={()=>{const headers=["Hissə adı","Hissə növü","Vəziyyət","İstehsalçı marka","İstehsalçı ölkə","Mühərrik","Avtomobil markaları","Avtomobil modelləri","İldən","İlə qədər","Qiymət","Mövcudluq","Qeydlər"];
const rows=[
  // Single-compat products — one row
  ["Radiator OEM","Radiator","Yeni","","","1.6 benzin","Peugeot","308","2014","2019","185","var","Ventilyator daxildir"],
  ["Alternator işlənmiş","Alternator","İşlənmiş","Bosch","Almaniya","1.6","Lada/VAZ","Granta","2015","2022","120","var",""],
  ["Amortizator ön sol","Amortizator","Yeni","","Çin","","Hyundai","Accent","2014","2020","68","sifarişlə",""],
  // Multi-compat product — repeat the product on multiple rows, one car per row
  // Same name+price on each row = system groups them into one product with multiple compatibility entries
  ["Ön tormoz bəndləri","Tormoz bəndi","Yeni","Brembo","İtaliya","","Toyota","Camry","2015","2022","55","var",""],
  ["Ön tormoz bəndləri","Tormoz bəndi","Yeni","Brembo","İtaliya","","Toyota","Corolla","2014","2021","55","var",""],
  ["Ön tormoz bəndləri","Tormoz bəndi","Yeni","Brembo","İtaliya","","Hyundai","Elantra","2018","2023","55","var",""],
  ["Yağ filteri","Yağ filteri","Yeni","Mann","Almaniya","","Toyota","Camry","2015","2023","18","var",""],
  ["Yağ filteri","Yağ filteri","Yeni","Mann","Almaniya","","Honda","Accord","2016","2022","18","var",""],
];
const csv=[headers,...rows].map(r=>r.map(v=>String(v).includes(",")?`"${v}"`:v).join(",")).join("\n");
const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="numune_mehsul_siyahisi.csv";a.click();}}>{AZ.downloadSample}</button></div>
      </div>
    </div>
  );
}

// ── REVIEW ──
function ReviewScreen({data,seller,onBack,onPublish}){
  const [tab,setTab]=useState("all");
  const [mappings,setMappings]=useState(data.mappings);
  const [publishing,setPublishing]=useState(false);
  const rows=data.rows;
  const ok=rows.filter(r=>r._status==="ok"),warn=rows.filter(r=>r._status==="warn"),err=rows.filter(r=>r._status==="err");
  const display=tab==="all"?rows:tab==="warn"?warn:err;
  const opts=["partName","partType","condition","manufacturerBrand","manufacturerCountry","engine","compatMakes","compatModels","yearFrom","yearTo","price","availability","notes","ignore"];
  const upd=(i,val)=>setMappings(m=>m.map((item,idx)=>idx===i?{...item,inferred:val,confidence:"ok"}:item));

  const handlePublish=async()=>{
    setPublishing(true);
    const region=seller.city==="Bakı"?"baku":seller.city==="Naxçıvan"?"nakh":seller.city==="Gəncə"?"ganja":"other";
    const batch=db.batch();
    const readyRows=[...ok,...warn].filter(r=>r._status!=="err");
    readyRows.forEach(row=>{
      const ref=db.collection("products").doc();
      const compat=row.compatibility||[];
      batch.set(ref,{
        name:row.partName||"",
        partType:row.partType||"",
        condition:row.condition||AZ.condNew,
        manufacturerBrand:row.manufacturerBrand||"",
        manufacturerCountry:row.manufacturerCountry||"",
        engine:row.engine||"",
        compatibility:compat,
        // Legacy flat fields from first compat entry
        brand:compat[0]?.make||"",
        model:compat[0]?.model||"",
        yearFrom:compat[0]?.yearFrom||null,
        yearTo:compat[0]?.yearTo||null,
        price:row.price?Number(row.price):null,
        availability:row.availability==="var"||row.availability==="in_stock"?"in_stock":"on_order",
        notes:row.notes||"",
        status:"live",sellerId:seller.uid,region,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
    });
    await batch.commit();
    await db.collection("sellers").doc(seller.uid).update({lastUpload:firebase.firestore.FieldValue.serverTimestamp()});
    setPublishing(false);
    const now=new Date();
    onPublish(readyRows.length, now);
  };

  return(
    <div>
      <div className="review-header">
        <button className="back-btn" onClick={onBack}><Icon name="arrowLeft" size={14} strokeWidth={2}/> {AZ.back}</button>
        <div className="review-title">{AZ.reviewTitle}</div>
        <div className="summary-pills">
          <span className="pill pill-ok">✓ {ok.length} {AZ.ready}</span>
          {warn.length>0&&<span className="pill pill-warn">⚠ {warn.length} {AZ.uncertain}</span>}
          {err.length>0&&<span className="pill pill-err">✕ {err.length} {AZ.failed}</span>}
        </div>
      </div>
      <div className="mapping-section">
        <div className="section-label" style={{marginBottom:10}}>{AZ.columnMapping}</div>
        <div className="mapping-grid">
          {mappings.map((m,i)=>(
            <div key={i} className="mapping-row">
              <div className="m-orig" title={m.original}>{m.original}</div>
              <div className="m-arrow">→</div>
              <select style={{fontFamily:"var(--font-b)",fontSize:12,fontWeight:500,background:m.confidence==="ok"?"var(--green-bg)":"var(--amber-bg)",color:m.confidence==="ok"?"var(--green)":"var(--amber)",border:"none",borderRadius:6,padding:"5px 8px",cursor:"pointer",width:"100%"}} value={m.inferred||"ignore"} onChange={e=>upd(i,e.target.value)}>
                {opts.map(o=><option key={o} value={o}>{CANON_LABELS[o]||(o==="ignore"?"İqnor et":o)}</option>)}
              </select>
            </div>
          ))}
        </div>
      </div>
      <div className="review-tabs">
        <button className={`rtab ${tab==="all"?"active":""}`} onClick={()=>setTab("all")}>{AZ.allRows} ({rows.length})</button>
        {warn.length>0&&<button className={`rtab ${tab==="warn"?"active":""}`} onClick={()=>setTab("warn")}>{AZ.uncertainRows} ({warn.length})</button>}
        {err.length>0&&<button className={`rtab ${tab==="err"?"active":""}`} onClick={()=>setTab("err")}>{AZ.failedRows} ({err.length})</button>}
      </div>
      <div>
        {display.map((row,i)=>(
          <div key={i} className={`review-row ${row._status!=="ok"?row._status:""}`}>
            <div><div className="rr-name">{row.partName||<em style={{color:"var(--g400)"}}>Ad yoxdur</em>}</div><div className={`rr-issue ${row._status}`}>{row._issue}</div></div>
            <div className="rr-price">{row.price?`₼ ${row.price}`:<span style={{color:"var(--g400)"}}>—</span>}</div>
            <div style={{display:"flex",justifyContent:"flex-end"}}><div className={`status-circle sc-${row._status}`}/></div>
          </div>
        ))}
      </div>
      <div className="review-footer">
        <button className="btn btn-secondary" style={{flex:1}} onClick={onBack}>{AZ.saveDrafts}</button>
        <button className="btn btn-primary" style={{flex:2}} onClick={handlePublish} disabled={publishing}>
          {publishing?<span className="loading-dots">Dərc edilir</span>:`${ok.length+warn.length} ${AZ.publishRows} →`}
        </button>
      </div>
    </div>
  );
}

// ── ROOT APP ──
function App(){
  const [authLoading,setAuthLoading]=useState(true);
  const [region,setRegion]=useState("baku");
  const [mode,setMode]=useState("buyer");
  const [screen,setScreen]=useState("home");
  const [query,setQuery]=useState("");
  const [selectedProduct,setSP]=useState(null);
  const [selectedSeller,setSeller]=useState(null);
  const [editingProduct,setEP]=useState(null);
  const [uploadData,setUD]=useState(null);
  const [currentUser,setCurrentUser]=useState(null); // Firebase auth user
  const [sellerInfo,setSellerInfo]=useState(null);   // Firestore seller profile

  const [toast,setToast]=useState(null);
  const showToast=msg=>setToast(msg);

  // Auth state listener
  useEffect(()=>{
    return auth.onAuthStateChanged(async user=>{
      if(user){
        setCurrentUser(user);
        const doc=await db.collection("sellers").doc(user.uid).get();
        if(doc.exists){
          setSellerInfo({uid:user.uid,...doc.data()});
          setMode("seller");
          // If user lands on login screen while already authed, redirect to dashboard
          setScreen(prev=>prev==="login"?"dashboard":prev);
        }
      }else{
        setCurrentUser(null);setSellerInfo(null);
        setMode("buyer");
      }
      setAuthLoading(false);
    });
  },[]);

  // Live seller cities for dynamic region list
  const [sellerCities,setSellerCities]=useState([]);
  useEffect(()=>{
    return db.collection("sellers").onSnapshot(snap=>{
      const cities=[];
      snap.docs.forEach(d=>{const data=d.data();if(data.city) cities.push(data.city);});
      setSellerCities([...new Set(cities)]);
    });
  },[]);

  const goHome=()=>{setMode("buyer");setScreen("home");setSP(null);};

  const handleLogin=(info, isNew)=>{
    // Don't set currentUser manually — onAuthStateChanged fires automatically
    // after Firebase auth and sets the real user object reliably
    setSellerInfo(info);
    setMode("seller");setScreen(isNew?"settings":"dashboard");
  };

  const handleLogout=async()=>{
    await auth.signOut();
    setCurrentUser(null);setSellerInfo(null);
    setMode("buyer");setScreen("home");
    showToast("Çıxış edildi");
  };

  const handleSaveSettings=async(form)=>{
    const updated={...sellerInfo,...form};setSellerInfo(updated);
    setScreen("dashboard");showToast(AZ.settingsSaved);
  };

  if(authLoading) return <div className="app"><div className="topnav"><div className="topnav-logo" dangerouslySetInnerHTML={{__html:LOGO_SVG+'Partal'}}/></div><Spinner/></div>;

  const renderBuyer=()=>{
    if(screen==="results")return <ResultsPage query={query} region={region} onBack={()=>setScreen("home")} onProduct={(p,s)=>{setSP(p);setSeller(s);}} onContact={()=>{}}/>;
    if(screen==="login")return <LoginPage onLogin={handleLogin} onBack={()=>setScreen("home")}/>;
    return <BuyerHome onSearch={q=>{setQuery(q);setScreen("results");}} onSellerLogin={()=>{if(currentUser&&sellerInfo){setMode("seller");setScreen("dashboard");}else{setScreen("login");}}} sellerCounts={sellerCounts} region={region} onRegion={setRegion}/>;
  };

  const renderSeller=()=>{
    if(!currentUser)return authLoading?<Spinner/>:<LoginPage onLogin={handleLogin} onBack={goHome}/>;
    if(screen==="form")return <ProductForm product={editingProduct} seller={sellerInfo} onBack={()=>{setScreen("dashboard");setEP(null);}} onSaved={(isDraft)=>{setScreen("dashboard");setEP(null);showToast(isDraft?AZ.draftSaved:editingProduct?.id?AZ.productUpdated:AZ.productAdded);}} onDeleted={()=>{setScreen("dashboard");setEP(null);showToast(AZ.productDeleted);}}/>;
    if(screen==="upload")return <UploadScreen seller={sellerInfo} onBack={()=>setScreen("dashboard")} onReview={d=>{setUD(d);setScreen("review");}}/>;
    if(screen==="review"&&uploadData)return <ReviewScreen data={uploadData} seller={sellerInfo} onBack={()=>setScreen("upload")} onPublish={(count,uploadDate)=>{
              if(uploadDate) setSellerInfo(s=>({...s,lastUpload:uploadDate}));
              showToast(`${count} ${AZ.published}`);
              setScreen("dashboard");setUD(null);
            }}/>;
    if(screen==="settings")return <SettingsPage seller={sellerInfo} onSave={handleSaveSettings} onLogout={handleLogout} onBack={()=>setScreen(sellerInfo?.shopName?"dashboard":"settings")}/>;
    return <Dashboard seller={sellerInfo} onAdd={()=>{setEP(null);setScreen("form");}} onEdit={p=>{setEP(p);setScreen("form");}} onUpload={()=>setScreen("upload")} onSettings={()=>setScreen("settings")}/>;
  };

  return(
    <div className="app">
      <nav className="topnav">
        <div className="topnav-logo" onClick={goHome} dangerouslySetInnerHTML={{__html:LOGO_SVG+'Partal'}}/>
        {mode==="buyer"&&<RegionSelector region={region} onChange={setRegion} sellerCities={sellerCities}/>}
        {mode==="seller"&&currentUser&&sellerInfo&&(
          <div className="topnav-stats">
            <div className="topnav-stats-label">{AZ.todayStats}</div>
            <div id="header-stats">— {AZ.views} · — {AZ.contacts}</div>
          </div>
        )}
      </nav>
      <main className="main">{mode==="buyer"?renderBuyer():renderSeller()}</main>
      {selectedProduct&&<ProductSheet product={selectedProduct} seller={selectedSeller} onClose={()=>{setSP(null);setSeller(null);}} onContact={()=>{}}/>}
      {toast&&<Toast message={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
